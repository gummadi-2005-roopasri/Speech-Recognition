<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speech to Text</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Mono:ital,wght@0,400;0,500;1,400&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --border: #e0e4eb;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.12);
      --text: #1a202c;
      --muted: #718096;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, .app-root {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: auto;
    }

    .app-root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 2rem 1rem;
    }

    .glass-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .mic-ring {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      width: 100px;
      height: 100px;
    }

    .mic-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--border);
      transition: all 0.3s ease;
    }

    .mic-ring.listening::before {
      background: rgba(79,255,176,0.18);
      border-color: var(--accent);
      box-shadow: 0 0 0 0 rgba(79,255,176,0.5);
      animation: pulse-ring 1.4s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(79,255,176,0.45); }
      70%  { box-shadow: 0 0 0 22px rgba(79,255,176,0); }
      100% { box-shadow: 0 0 0 0 rgba(79,255,176,0); }
    }

    .mic-icon {
      position: relative;
      z-index: 1;
      width: 40px;
      height: 40px;
      color: var(--muted);
      transition: color 0.3s ease;
    }

    .mic-ring.listening .mic-icon {
      color: var(--accent);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: transparent;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }

    .status-badge.listening {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s ease;
    }

    .status-badge.listening .status-dot {
      background: var(--accent);
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .transcript-box {
      background: #f0f4f8;
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 160px;
      padding: 1.25rem 1.25rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
      transition: border-color 0.3s ease;
      position: relative;
    }

    .transcript-box.listening {
      border-color: rgba(79,255,176,0.3);
    }

    .transcript-placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .interim-text {
      color: rgba(79,255,176,0.65);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--accent);
      color: #0d0f14;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      padding: 0.75rem 1.75rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: var(--muted);
    }

    .btn-secondary:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255,95,109,0.08);
    }

    .btn-icon {
      width: 18px;
      height: 18px;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 3px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: 99px;
      border: 1px solid var(--border);
    }

    .stat-chip span {
      font-family: 'DM Mono', monospace;
      color: var(--text);
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: all 0.2s ease;
      opacity: 0;
    }

    .transcript-box:hover .copy-btn {
      opacity: 1;
    }

    .copy-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .error-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255,95,109,0.1);
      border: 1px solid rgba(255,95,109,0.3);
      border-radius: 10px;
      color: var(--danger);
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .error-banner.show {
      display: flex;
    }

    .lang-select {
      background: #f0f4f8;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .lang-select:focus {
      border-color: rgba(79,255,176,0.5);
    }

    .lang-select option {
      background: #181c26;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .no-support-msg {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-root">
   <div class="glass-card">
    <!-- Header -->
    <div class="text-center mb-6">
     <h1 id="app-title" style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text);">Speech to Text</h1>
     <p id="app-subtitle" style="color: var(--muted); font-size: 0.88rem; margin-top: 4px;">Speak and see your words appear</p>
    </div><!-- Error Banner -->
    <div class="error-banner" id="error-banner">
     <i data-lucide="alert-triangle" style="width:15px;height:15px;flex-shrink:0;"></i> <span id="error-msg">An error occurred.</span>
    </div><!-- No Support Message (hidden by default) -->
    <div class="no-support-msg" id="no-support" style="display:none;">
     <i data-lucide="mic-off" style="width:36px;height:36px;display:block;margin:0 auto 12px;color:var(--danger);"></i> <strong style="color:var(--text);">Browser Not Supported</strong><br>
      Speech recognition requires a modern browser like Chrome or Edge.
    </div><!-- Main UI (hidden if no support) -->
    <div id="main-ui">
     <!-- Mic Visualizer -->
     <div class="flex flex-col items-center">
      <div class="mic-ring" id="mic-ring">
       <i data-lucide="mic" class="mic-icon" id="mic-icon"></i>
      </div>
      <div class="status-badge" id="status-badge">
       <div class="status-dot"></div><span id="status-text">Ready</span>
      </div>
     </div><!-- Transcript Box -->
     <div style="position:relative;">
      <div class="transcript-box" id="transcript-box">
       <span class="transcript-placeholder" id="transcript-placeholder">Your transcription will appear here...</span> <button class="copy-btn" id="copy-btn" title="Copy to clipboard" aria-label="Copy transcript"> <i data-lucide="copy"></i> </button>
      </div>
     </div>
     <div class="divider"></div><!-- Controls Row -->
     <div class="flex items-center justify-between gap-3 flex-wrap">
      <!-- Language selector -->
      <div style="display:flex;align-items:center;gap:8px;">
       <label for="lang-select" style="font-size:0.78rem;color:var(--muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">Lang</label> <select class="lang-select" id="lang-select" aria-label="Language selection"> <option value="en-US">🇺🇸 English (US)</option> <option value="en-GB">🇬🇧 English (UK)</option> <option value="es-ES">🇪🇸 Spanish</option> <option value="fr-FR">🇫🇷 French</option> <option value="de-DE">🇩🇪 German</option> <option value="ja-JP">🇯🇵 Japanese</option> <option value="zh-CN">🇨🇳 Chinese</option> <option value="pt-BR">🇧🇷 Portuguese</option> <option value="ar-SA">🇸🇦 Arabic</option> </select>
      </div><!-- Stat chips -->
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
       <div class="stat-chip">
        words <span id="word-count">0</span>
       </div>
       <div class="stat-chip">
        chars <span id="char-count">0</span>
       </div>
      </div>
     </div><!-- Action Buttons -->
     <div class="flex gap-3 mt-4 flex-wrap">
      <button class="btn-primary" id="start-btn" style="flex:1;"> <i data-lucide="mic" class="btn-icon"></i> <span id="start-btn-label">Start Recording</span> </button> <button class="btn-secondary" id="clear-btn" style="flex:0 0 auto;"> <i data-lucide="trash-2" class="btn-icon"></i> Clear </button>
     </div>
    </div>
   </div><!-- Footer note -->
   <p style="color:var(--muted);font-size:0.72rem;margin-top:1.25rem;text-align:center;opacity:0.6;">Uses your browser's built-in speech recognition. Audio stays on your device.</p>
  </div>
  <script>
    // ──────────────────────────────────────────────
    // SDK Initialization
    // ──────────────────────────────────────────────
    const defaultConfig = {
      app_title: 'Speech to Text',
      subtitle_text: 'Speak and see your words appear',
      start_button_text: 'Start Recording',
      stop_button_text: 'Stop Recording',
      placeholder_text: 'Your transcription will appear here...',
      background_color: '#f8f9fc',
      surface_color: '#ffffff',
      text_color: '#1a202c',
      accent_color: '#3b82f6',
      muted_color: '#718096'
    };

    window.elementSdk && window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('app-title').textContent =
          config.app_title || defaultConfig.app_title;
        document.getElementById('app-subtitle').textContent =
          config.subtitle_text || defaultConfig.subtitle_text;
        document.getElementById('start-btn-label').textContent =
          isListening
            ? (config.stop_button_text || defaultConfig.stop_button_text)
            : (config.start_button_text || defaultConfig.start_button_text);
        const ph = document.getElementById('transcript-placeholder');
        if (ph) ph.textContent = config.placeholder_text || defaultConfig.placeholder_text;

        // Apply colors
        document.body.style.background = config.background_color || defaultConfig.background_color;
        document.querySelector('.glass-card').style.background = config.surface_color || defaultConfig.surface_color;
        document.getElementById('app-title').style.color = config.text_color || defaultConfig.text_color;

        const accent = config.accent_color || defaultConfig.accent_color;
        document.documentElement.style.setProperty('--accent', accent);
        document.documentElement.style.setProperty('--accent-dim', hexToRgba(accent, 0.12));
        document.documentElement.style.setProperty('--text', config.text_color || defaultConfig.text_color);
        document.documentElement.style.setProperty('--bg', config.background_color || defaultConfig.background_color);
        document.documentElement.style.setProperty('--surface', config.surface_color || defaultConfig.surface_color);
        document.documentElement.style.setProperty('--muted', config.muted_color || defaultConfig.muted_color);
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
          },
          {
            get: () => config.muted_color || defaultConfig.muted_color,
            set: (v) => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['app_title', config.app_title || defaultConfig.app_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text],
        ['start_button_text', config.start_button_text || defaultConfig.start_button_text],
        ['stop_button_text', config.stop_button_text || defaultConfig.stop_button_text],
        ['placeholder_text', config.placeholder_text || defaultConfig.placeholder_text]
      ])
    });

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // ──────────────────────────────────────────────
    // Speech Recognition Logic
    // ──────────────────────────────────────────────
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let recognition = null;
    let isListening = false;
    let finalTranscript = '';

    const startBtn        = document.getElementById('start-btn');
    const startBtnLabel   = document.getElementById('start-btn-label');
    const clearBtn        = document.getElementById('clear-btn');
    const micRing         = document.getElementById('mic-ring');
    const statusBadge     = document.getElementById('status-badge');
    const statusText      = document.getElementById('status-text');
    const transcriptBox   = document.getElementById('transcript-box');
    const placeholder     = document.getElementById('transcript-placeholder');
    const wordCount       = document.getElementById('word-count');
    const charCount       = document.getElementById('char-count');
    const errorBanner     = document.getElementById('error-banner');
    const errorMsg        = document.getElementById('error-msg');
    const copyBtn         = document.getElementById('copy-btn');
    const langSelect      = document.getElementById('lang-select');

    if (!SpeechRecognition) {
      document.getElementById('main-ui').style.display = 'none';
      document.getElementById('no-support').style.display = 'block';
    } else {
      setupRecognition();
    }

    function setupRecognition() {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = langSelect.value;

      recognition.onstart = () => {
        isListening = true;
        micRing.classList.add('listening');
        statusBadge.classList.add('listening');
        statusText.textContent = 'Listening…';
        startBtnLabel.textContent = getConfig('stop_button_text', 'Stop Recording');
        startBtn.style.background = 'var(--danger)';
        transcriptBox.classList.add('listening');
        hideError();
      };

      recognition.onend = () => {
        if (isListening) {
          // Auto-restart to maintain continuous listening
          try { recognition.start(); } catch(e) { stopListening(); }
        }
      };

      recognition.onerror = (e) => {
        if (e.error === 'no-speech') return; // ignore, just restart
        if (e.error === 'aborted') return;
        let msg = 'Speech recognition error.';
        if (e.error === 'not-allowed') msg = 'Microphone access denied. Please allow microphone permissions.';
        if (e.error === 'network')     msg = 'Network error. Check your internet connection.';
        if (e.error === 'audio-capture') msg = 'No microphone found. Please connect a microphone.';
        showError(msg);
        stopListening();
      };

      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const text = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            finalTranscript += text + ' ';
          } else {
            interim += text;
          }
        }
        renderTranscript(finalTranscript, interim);
        updateStats(finalTranscript + interim);
      };
    }

    function renderTranscript(final, interim) {
      // Clear old content
      while (transcriptBox.children.length > 0) {
        const child = transcriptBox.children[0];
        if (child.id === 'copy-btn') break;
        transcriptBox.removeChild(child);
      }

      if (!final && !interim) {
        if (!placeholder.parentElement) transcriptBox.insertBefore(placeholder, copyBtn);
        placeholder.style.display = '';
        return;
      }

      placeholder.style.display = 'none';

      if (final) {
        const finalNode = document.createTextNode(final);
        transcriptBox.insertBefore(finalNode, copyBtn);
      }

      if (interim) {
        const interimEl = document.createElement('span');
        interimEl.className = 'interim-text';
        interimEl.textContent = interim;
        transcriptBox.insertBefore(interimEl, copyBtn);
      }
    }

    function updateStats(text) {
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      wordCount.textContent = words;
      charCount.textContent = text.replace(/\s+/g,' ').trim().length;
    }

    function startListening() {
      recognition.lang = langSelect.value;
